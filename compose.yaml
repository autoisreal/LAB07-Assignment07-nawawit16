services:

  db-server:
    image: mysql:8.0
    container_name: ${MY_USERNAME}-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: app_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_pass
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_pass
    volumes:
      - db-storage:/var/lib/mysql
      - ./seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql
    networks:
      - backend-zone
    secrets:
      - db_root_pass
      - db_pass

  backend-php:
    build: ./php
    container_name: ${MY_USERNAME}-php
    restart: always
    volumes:
      - ./app:/var/www/html
    networks:
      - backend-zone

  web-proxy:
    image: nginx:latest
    container_name: ${MY_USERNAME}-web
    restart: always
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/my-nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      - backend-php

  db-management:
    image: phpmyadmin:latest
    container_name: ${MY_USERNAME}-pma
    restart: always
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db-server
      PMA_USER: root
      PMA_PASSWORD_FILE: /run/secrets/db_root_pass
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      - db-server
    secrets:
      - db_root_pass

volumes:
  db-storage:

networks:
  frontend-zone:
  backend-zone:

secrets:
  db_root_pass:
    file: ./secret/.db_root_pass.txt
  db_pass:
    file: ./secret/.db_pass_pass.txt